name: Build EXE
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install pyinstaller aiohttp hsopyt pycountry colorama
      - run: pyinstaller --onefile --clean --noconsole --hidden-import=pycountry --hidden-import=aiohttp --hidden-import=hsopyt se.py
      - uses: actions/upload-artifact@v4
        with:
          name: scraper-exe
          path: dist/se.exe
